<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>GitMemo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body { font-family: sans-serif; padding: 10px; }
input, button { font-size: 16px; margin: 5px 0; }
li { margin-bottom: 8px; }
</style>

</head>
<body>

<h2>イベント追加</h2>

<input id="title" placeholder="タイトル"><br>
<input id="datetime" type="datetime-local"><br>
<button onclick="addEvent()">追加</button>

<hr>

<h2>一覧（新しい順）</h2>
<ul id="list"></ul>

<script>
const SUPABASE_URL = "https://bkgympxaycqbekucvssg.supabase.co";
const API_KEY = "YOUR_API_KEY"; // 必要に応じて差し替え

const client = supabase.createClient(SUPABASE_URL, API_KEY);

// =========================
// Rawフォーマット生成
// =========================
function formatRaw(dt, title) {
    const d = new Date(dt);

    const year = d.getFullYear();
    const eraYear = year - 2018; // 令和

    const m = String(d.getMonth() + 1).padStart(2, "0");
    const day = String(d.getDate()).padStart(2, "0");
    const h = String(d.getHours()).padStart(2, "0");
    const min = String(d.getMinutes()).padStart(2, "0");

    return `R${eraYear}.${m}.${day} ${h}:${min} ${title}`;
}

// =========================
// 一覧取得（新しい順）
// =========================
async function loadEvents() {
    const res = await fetch(
        `${SUPABASE_URL}/rest/v1/events?select=*&order=start_datetime.desc,id.desc`,
        {
            headers: {
                "apikey": API_KEY,
                "Authorization": "Bearer " + API_KEY
            }
        }
    );

    const data = await res.json();

    const list = document.getElementById("list");
    list.innerHTML = "";

    data.forEach(e => {
        const li = document.createElement("li");

        // Rawをそのまま表示
        li.textContent = e.raw;

        const btn = document.createElement("button");
        btn.textContent = "削除";
        btn.onclick = () => deleteEvent(e.id);

        li.appendChild(btn);
        list.appendChild(li);
    });
}

// =========================
// 追加
// =========================
async function addEvent() {
    const title = document.getElementById("title").value.trim();
    const dt = document.getElementById("datetime").value;

    if (!title || !dt) {
        alert("入力必須");
        return;
    }

    const raw = formatRaw(dt, title);
    const id = crypto.randomUUID();

    await fetch(`${SUPABASE_URL}/rest/v1/events`, {
        method: "POST",
        headers: {
            "apikey": API_KEY,
            "Authorization": "Bearer " + API_KEY,
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            id: id,
            title: title,
            start_datetime: new Date(dt).toISOString(),
            raw: raw
        })
    });

    // 入力クリア
    document.getElementById("title").value = "";
    document.getElementById("datetime").value = "";

    loadEvents();
}

// =========================
// 削除
// =========================
async function deleteEvent(id) {
    if (!confirm("削除する？")) return;

    await fetch(`${SUPABASE_URL}/rest/v1/events?id=eq.${id}`, {
        method: "DELETE",
        headers: {
            "apikey": API_KEY,
            "Authorization": "Bearer " + API_KEY
        }
    });

    loadEvents();
}

// =========================
// リアルタイム更新
// =========================
client
  .channel('events')
  .on(
      'postgres_changes',
      { event: '*', schema: 'public', table: 'events' },
      payload => {
          loadEvents();
      }
  )
  .subscribe();

// 初回ロード
loadEvents();
</script>

</body>
</html>
