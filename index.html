<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>GitMemo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
    font-family: sans-serif;
    margin: 0;
    background: #f5f5f5;
}

/* 上部固定エリア */
.topbar {
    position: sticky;
    top: 0;
    background: white;
    padding: 10px;
    z-index: 10;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.header {
    font-size: 20px;
    font-weight: bold;
}

/* 入力 */
input {
    width: 100%;
    font-size: 14px;
    padding: 6px;
    margin: 4px 0;
    box-sizing: border-box;
}

/* ボタン */
button {
    font-size: 14px;
    padding: 6px 10px;
    border-radius: 8px;
    border: none;
}

.add-btn {
    background: #007bff;
    color: white;
}

.delete-btn {
    background: #dc3545;
    color: white;
    margin-left: 6px;
}

/* リスト */
#list {
    padding: 10px;
}

/* カード */
.card {
    display: flex;
    align-items: center;
    background: white;
    padding: 10px;
    margin-bottom: 8px;
    border-radius: 10px;
}

/* チェック固定領域 */
.check-area {
    width: 28px; /* 固定 */
    display: flex;
    justify-content: center;
}

.check {
    display: none;
}

.card.delete-mode .check {
    display: block;
}

/* 内容 */
.content {
    flex: 1;
}

.date {
    font-size: 12px;
    color: #666;
}

.time {
    font-size: 17px;
    font-weight: bold;
}

.title {
    font-size: 14px;
}
</style>

</head>
<body>

<div class="topbar">
    <div class="header">GitMemo</div>

    <input id="title" placeholder="タイトル">
    <input id="datetime" type="datetime-local">

    <button class="add-btn" onclick="addEvent()">追加</button>
    <button class="delete-btn" onclick="toggleDeleteMode()" id="deleteBtn">削除モード</button>
</div>

<div id="list"></div>

<script>
const SUPABASE_URL = "https://bkgympxaycqbekucvssg.supabase.co";
const API_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJrZ3ltcHhheWNxYmVrdWN2c3NnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4ODc3NjcsImV4cCI6MjA5MjQ2Mzc2N30.sT6fukSYmRWPQzsTkH1iYe91qyH8CLIVijX_Is8w1uo";

const client = supabase.createClient(SUPABASE_URL, API_KEY);

let deleteMode = false;

// Raw生成
function formatRaw(dt, title) {
    const d = new Date(dt);
    const year = d.getFullYear();
    const eraYear = year - 2018;

    const m = String(d.getMonth() + 1).padStart(2, "0");
    const day = String(d.getDate()).padStart(2, "0");
    const h = String(d.getHours()).padStart(2, "0");
    const min = String(d.getMinutes()).padStart(2, "0");

    return `R${eraYear}.${m}.${day} ${h}:${min} ${title}`;
}

// パース
function parseRaw(raw) {
    const m = raw.match(/^R(\d+)\.(\d{2})\.(\d{2}) (\d{2}:\d{2}) (.+)$/);
    if (!m) return null;

    return {
        date: `${2018 + parseInt(m[1])}/${m[2]}/${m[3]}`,
        time: m[4],
        title: m[5]
    };
}

// 一覧
async function loadEvents() {
    const res = await fetch(
        `${SUPABASE_URL}/rest/v1/events?select=*&order=start_datetime.desc,id.desc`,
        {
            headers: {
                "apikey": API_KEY,
                "Authorization": "Bearer " + API_KEY
            }
        }
    );

    const data = await res.json();
    const list = document.getElementById("list");
    list.innerHTML = "";

    data.forEach(e => {
        const p = parseRaw(e.raw);

        const card = document.createElement("div");
        card.className = "card";
        if (deleteMode) card.classList.add("delete-mode");

        const checkArea = document.createElement("div");
        checkArea.className = "check-area";

        const check = document.createElement("input");
        check.type = "checkbox";
        check.className = "check";
        check.dataset.id = e.id;

        checkArea.appendChild(check);

        const content = document.createElement("div");
        content.className = "content";

        if (p) {
            content.innerHTML = `
                <div class="date">${p.date}</div>
                <div class="time">${p.time}</div>
                <div class="title">${p.title}</div>
            `;
        } else {
            content.textContent = e.raw;
        }

        card.appendChild(checkArea);
        card.appendChild(content);
        list.appendChild(card);
    });
}

// 追加
async function addEvent() {
    const title = document.getElementById("title").value.trim();
    const dt = document.getElementById("datetime").value;

    if (!title || !dt) return alert("入力必須");

    const raw = formatRaw(dt, title);

    await fetch(`${SUPABASE_URL}/rest/v1/events`, {
        method: "POST",
        headers: {
            "apikey": API_KEY,
            "Authorization": "Bearer " + API_KEY,
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            id: crypto.randomUUID(),
            title,
            start_datetime: new Date(dt).toISOString(),
            raw
        })
    });

    loadEvents();
}

// モード切替
function toggleDeleteMode() {
    const btn = document.getElementById("deleteBtn");

    if (!deleteMode) {
        deleteMode = true;
        btn.textContent = "削除実行";
    } else {
        executeDelete();
    }

    loadEvents();
}

// 削除
async function executeDelete() {
    const checks = document.querySelectorAll(".check:checked");

    if (checks.length === 0) {
        resetMode();
        return;
    }

    if (!confirm("削除しますか？")) {
        resetMode();
        return;
    }

    for (const c of checks) {
        await fetch(`${SUPABASE_URL}/rest/v1/events?id=eq.${c.dataset.id}`, {
            method: "DELETE",
            headers: {
                "apikey": API_KEY,
                "Authorization": "Bearer " + API_KEY
            }
        });
    }

    resetMode();
    loadEvents();
}

function resetMode() {
    deleteMode = false;
    document.getElementById("deleteBtn").textContent = "削除モード";
}

// realtime
client.channel('events')
  .on('postgres_changes',
      { event: '*', schema: 'public', table: 'events' },
      () => loadEvents()
  )
  .subscribe();

loadEvents();
</script>

</body>
</html>
