<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>GitMemo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
    font-family: sans-serif;
    padding: 10px;
    background: #f5f5f5;
}

input, button {
    font-size: 16px;
    margin: 5px 0;
}

.card {
    background: white;
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 10px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.date {
    font-weight: bold;
    font-size: 14px;
    color: #555;
}

.time {
    font-size: 18px;
    font-weight: bold;
    margin-top: 4px;
}

.title {
    margin-top: 6px;
    font-size: 16px;
}

.delete-btn {
    margin-top: 8px;
}
</style>

</head>
<body>

<h2>イベント追加</h2>

<input id="title" placeholder="タイトル"><br>
<input id="datetime" type="datetime-local"><br>
<button onclick="addEvent()">追加</button>

<hr>

<h2>一覧</h2>
<div id="list"></div>

<script>
const SUPABASE_URL = "https://bkgympxaycqbekucvssg.supabase.co";
const API_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJrZ3ltcHhheWNxYmVrdWN2c3NnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4ODc3NjcsImV4cCI6MjA5MjQ2Mzc2N30.sT6fukSYmRWPQzsTkH1iYe91qyH8CLIVijX_Is8w1uo";

const client = supabase.createClient(SUPABASE_URL, API_KEY);

// =========================
// Rawフォーマット生成
// =========================
function formatRaw(dt, title) {
    const d = new Date(dt);

    const year = d.getFullYear();
    const eraYear = year - 2018;

    const m = String(d.getMonth() + 1).padStart(2, "0");
    const day = String(d.getDate()).padStart(2, "0");
    const h = String(d.getHours()).padStart(2, "0");
    const min = String(d.getMinutes()).padStart(2, "0");

    return `R${eraYear}.${m}.${day} ${h}:${min} ${title}`;
}

// =========================
// Rawを分解（表示用）
// =========================
function parseRaw(raw) {
    // R6.04.01 10:00 会議
    const match = raw.match(/^R(\d+)\.(\d{2})\.(\d{2}) (\d{2}:\d{2}) (.+)$/);
    if (!match) return null;

    const year = 2018 + parseInt(match[1]);

    return {
        date: `${year}/${match[2]}/${match[3]}`,
        time: match[4],
        title: match[5]
    };
}

// =========================
// 一覧取得
// =========================
async function loadEvents() {
    const res = await fetch(
        `${SUPABASE_URL}/rest/v1/events?select=*&order=start_datetime.desc,id.desc`,
        {
            headers: {
                "apikey": API_KEY,
                "Authorization": "Bearer " + API_KEY
            }
        }
    );

    const data = await res.json();

    const list = document.getElementById("list");
    list.innerHTML = "";

    data.forEach(e => {
        const parsed = parseRaw(e.raw);

        const card = document.createElement("div");
        card.className = "card";

        if (parsed) {
            card.innerHTML = `
                <div class="date">${parsed.date}</div>
                <div class="time">${parsed.time}</div>
                <div class="title">${parsed.title}</div>
            `;
        } else {
            // フォールバック
            card.textContent = e.raw;
        }

        const btn = document.createElement("button");
        btn.textContent = "削除";
        btn.className = "delete-btn";
        btn.onclick = () => deleteEvent(e.id);

        card.appendChild(btn);
        list.appendChild(card);
    });
}

// =========================
// 追加
// =========================
async function addEvent() {
    const title = document.getElementById("title").value.trim();
    const dt = document.getElementById("datetime").value;

    if (!title || !dt) {
        alert("入力必須");
        return;
    }

    const raw = formatRaw(dt, title);
    const id = crypto.randomUUID();

    await fetch(`${SUPABASE_URL}/rest/v1/events`, {
        method: "POST",
        headers: {
            "apikey": API_KEY,
            "Authorization": "Bearer " + API_KEY,
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            id: id,
            title: title,
            start_datetime: new Date(dt).toISOString(),
            raw: raw
        })
    });

    document.getElementById("title").value = "";
    document.getElementById("datetime").value = "";

    loadEvents();
}

// =========================
// 削除
// =========================
async function deleteEvent(id) {
    if (!confirm("削除する？")) return;

    await fetch(`${SUPABASE_URL}/rest/v1/events?id=eq.${id}`, {
        method: "DELETE",
        headers: {
            "apikey": API_KEY,
            "Authorization": "Bearer " + API_KEY
        }
    });

    loadEvents();
}

// リアルタイム
client
  .channel('events')
  .on(
      'postgres_changes',
      { event: '*', schema: 'public', table: 'events' },
      () => loadEvents()
  )
  .subscribe();

loadEvents();
</script>

</body>
</html>
