<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>GitMemo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<h2>イベント追加</h2>

<input id="title" placeholder="タイトル"><br><br>
<input id="datetime" type="datetime-local"><br><br>
<button onclick="addEvent()">追加</button>

<hr>

<h2>一覧</h2>
<ul id="list"></ul>

<script>
const SUPABASE_URL = "ここにProject URL";
const API_KEY = "ここにanon public key";

async function loadEvents() {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/events?select=*`, {
        headers: {
            "apikey": API_KEY,
            "Authorization": "Bearer " + API_KEY
        }
    });

    const data = await res.json();

    const list = document.getElementById("list");
    list.innerHTML = "";

    data.forEach(e => {
        const li = document.createElement("li");
        li.textContent = e.start_datetime + " " + e.title;

        const btn = document.createElement("button");
        btn.textContent = "削除";
        btn.onclick = () => deleteEvent(e.id);

        li.appendChild(btn);
        list.appendChild(li);
    });
}

async function addEvent() {
    const title = document.getElementById("title").value;
    const dt = document.getElementById("datetime").value;

    const id = "id_" + Date.now();

    await fetch(`${SUPABASE_URL}/rest/v1/events`, {
        method: "POST",
        headers: {
            "apikey": API_KEY,
            "Authorization": "Bearer " + API_KEY,
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            id: id,
            title: title,
            start_datetime: new Date(dt).toISOString(),
            raw: title
        })
    });

    loadEvents();
}

async function deleteEvent(id) {
    await fetch(`${SUPABASE_URL}/rest/v1/events?id=eq.${id}`, {
        method: "DELETE",
        headers: {
            "apikey": API_KEY,
            "Authorization": "Bearer " + API_KEY
        }
    });

    loadEvents();
}

loadEvents();
</script>

</body>
</html>
