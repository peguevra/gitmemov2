<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>GitMemo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
    font-family: sans-serif;
    padding: 10px;
    background: #f5f5f5;
}

/* ヘッダ */
.header {
    font-size: 22px;
    font-weight: bold;
    margin-bottom: 10px;
}

/* 入力 */
input {
    font-size: 16px;
    margin: 5px 0;
    width: 100%;
}

/* ボタン共通 */
button {
    font-size: 16px;
    padding: 8px 12px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
}

/* 追加ボタン */
.add-btn {
    background: #007bff;
    color: white;
}

/* 削除モード */
.delete-mode-btn {
    background: #dc3545;
    color: white;
    margin-left: 8px;
}

/* カード */
.card {
    display: flex;
    align-items: center;
    background: white;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 10px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

/* チェック */
.check {
    margin-right: 10px;
    display: none;
}

.card.delete-mode .check {
    display: block;
}

/* 内容 */
.content {
    flex: 1;
}

.date {
    font-size: 13px;
    color: #666;
}

.time {
    font-size: 18px;
    font-weight: bold;
}

.title {
    font-size: 15px;
}
</style>

</head>
<body>

<div class="header">GitMemo</div>

<input id="title" placeholder="タイトル">
<input id="datetime" type="datetime-local">

<button class="add-btn" onclick="addEvent()">追加</button>
<button class="delete-mode-btn" onclick="toggleDeleteMode()" id="deleteBtn">削除モード</button>

<hr>

<div id="list"></div>

<script>
const SUPABASE_URL = "https://bkgympxaycqbekucvssg.supabase.co";
const API_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJrZ3ltcHhheWNxYmVrdWN2c3NnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4ODc3NjcsImV4cCI6MjA5MjQ2Mzc2N30.sT6fukSYmRWPQzsTkH1iYe91qyH8CLIVijX_Is8w1uo";

const client = supabase.createClient(SUPABASE_URL, API_KEY);

let deleteMode = false;

// Raw生成
function formatRaw(dt, title) {
    const d = new Date(dt);
    const year = d.getFullYear();
    const eraYear = year - 2018;

    const m = String(d.getMonth() + 1).padStart(2, "0");
    const day = String(d.getDate()).padStart(2, "0");
    const h = String(d.getHours()).padStart(2, "0");
    const min = String(d.getMinutes()).padStart(2, "0");

    return `R${eraYear}.${m}.${day} ${h}:${min} ${title}`;
}

// Rawパース
function parseRaw(raw) {
    const m = raw.match(/^R(\d+)\.(\d{2})\.(\d{2}) (\d{2}:\d{2}) (.+)$/);
    if (!m) return null;

    return {
        date: `${2018 + parseInt(m[1])}/${m[2]}/${m[3]}`,
        time: m[4],
        title: m[5]
    };
}

// 一覧
async function loadEvents() {
    const res = await fetch(
        `${SUPABASE_URL}/rest/v1/events?select=*&order=start_datetime.desc,id.desc`,
        {
            headers: {
                "apikey": API_KEY,
                "Authorization": "Bearer " + API_KEY
            }
        }
    );

    const data = await res.json();

    const list = document.getElementById("list");
    list.innerHTML = "";

    data.forEach(e => {
        const p = parseRaw(e.raw);

        const card = document.createElement("div");
        card.className = "card";

        if (deleteMode) card.classList.add("delete-mode");

        const check = document.createElement("input");
        check.type = "checkbox";
        check.className = "check";
        check.dataset.id = e.id;

        const content = document.createElement("div");
        content.className = "content";

        if (p) {
            content.innerHTML = `
                <div class="date">${p.date}</div>
                <div class="time">${p.time}</div>
                <div class="title">${p.title}</div>
            `;
        } else {
            content.textContent = e.raw;
        }

        card.appendChild(check);
        card.appendChild(content);
        list.appendChild(card);
    });
}

// 追加
async function addEvent() {
    const title = document.getElementById("title").value.trim();
    const dt = document.getElementById("datetime").value;

    if (!title || !dt) return alert("入力必須");

    const raw = formatRaw(dt, title);

    await fetch(`${SUPABASE_URL}/rest/v1/events`, {
        method: "POST",
        headers: {
            "apikey": API_KEY,
            "Authorization": "Bearer " + API_KEY,
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            id: crypto.randomUUID(),
            title,
            start_datetime: new Date(dt).toISOString(),
            raw
        })
    });

    loadEvents();
}

// 削除モード切替
function toggleDeleteMode() {
    const btn = document.getElementById("deleteBtn");

    if (!deleteMode) {
        deleteMode = true;
        btn.textContent = "削除実行";
    } else {
        executeDelete();
    }

    loadEvents();
}

// 削除実行
async function executeDelete() {
    const checks = document.querySelectorAll(".check:checked");

    if (checks.length === 0) {
        deleteMode = false;
        document.getElementById("deleteBtn").textContent = "削除モード";
        return;
    }

    if (!confirm("削除しますか？")) {
        deleteMode = false;
        document.getElementById("deleteBtn").textContent = "削除モード";
        return;
    }

    for (const c of checks) {
        await fetch(`${SUPABASE_URL}/rest/v1/events?id=eq.${c.dataset.id}`, {
            method: "DELETE",
            headers: {
                "apikey": API_KEY,
                "Authorization": "Bearer " + API_KEY
            }
        });
    }

    deleteMode = false;
    document.getElementById("deleteBtn").textContent = "削除モード";

    loadEvents();
}

// リアルタイム
client.channel('events')
  .on('postgres_changes',
      { event: '*', schema: 'public', table: 'events' },
      () => loadEvents()
  )
  .subscribe();

loadEvents();
</script>

</body>
</html>
