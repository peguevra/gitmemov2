<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>GitMemo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body { font-family: sans-serif; padding: 10px; }
input, button { font-size: 16px; margin: 5px 0; }
li { margin-bottom: 8px; }
</style>

</head>
<body>

<h2>イベント追加</h2>

<input id="title" placeholder="タイトル"><br>
<input id="datetime" type="datetime-local"><br>
<button onclick="addEvent()">追加</button>

<hr>

<h2>一覧</h2>
<ul id="list"></ul>

<script>
const SUPABASE_URL = "https://bkgympxaycqbekucvssg.supabase.co";
const API_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJrZ3ltcHhheWNxYmVrdWN2c3NnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4ODc3NjcsImV4cCI6MjA5MjQ2Mzc2N30.sT6fukSYmRWPQzsTkH1iYe91qyH8CLIVijX_Is8w1uo";

const client = supabase.createClient(SUPABASE_URL, API_KEY);

// =========================
// 一覧取得
// =========================
async function loadEvents() {
    const res = await fetch(
        `${SUPABASE_URL}/rest/v1/events?select=*&order=start_datetime.asc`,
        {
            headers: {
                "apikey": API_KEY,
                "Authorization": "Bearer " + API_KEY
            }
        }
    );

    const data = await res.json();

    const list = document.getElementById("list");
    list.innerHTML = "";

    data.forEach(e => {
        const li = document.createElement("li");
        li.textContent = e.start_datetime + " " + e.title;

        const btn = document.createElement("button");
        btn.textContent = "削除";
        btn.onclick = () => deleteEvent(e.id);

        li.appendChild(btn);
        list.appendChild(li);
    });
}

// =========================
// 追加
// =========================
async function addEvent() {
    const title = document.getElementById("title").value;
    const dt = document.getElementById("datetime").value;

    if (!title || !dt) {
        alert("入力必須");
        return;
    }

    const id = crypto.randomUUID();

    await fetch(`${SUPABASE_URL}/rest/v1/events`, {
        method: "POST",
        headers: {
            "apikey": API_KEY,
            "Authorization": "Bearer " + API_KEY,
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            id: id,
            title: title,
            start_datetime: new Date(dt).toISOString(),
            raw: title
        })
    });

    loadEvents();
}

// =========================
// 削除
// =========================
async function deleteEvent(id) {
    if (!confirm("削除する？")) return;

    await fetch(`${SUPABASE_URL}/rest/v1/events?id=eq.${id}`, {
        method: "DELETE",
        headers: {
            "apikey": API_KEY,
            "Authorization": "Bearer " + API_KEY
        }
    });

    loadEvents();
}

// =========================
// リアルタイム更新
// =========================
client
  .channel('events')
  .on('postgres_changes',
      { event: '*', schema: 'public', table: 'events' },
      payload => {
          loadEvents();
      }
  )
  .subscribe();

// 初回ロード
loadEvents();
</script>

</body>
</html>
